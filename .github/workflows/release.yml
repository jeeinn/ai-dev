# Build multi-platform gateway binaries and open a draft GitHub Release on tag push.
# Maintainer flow: update CHANGELOG → git tag -a vX.Y.Z → git push origin vX.Y.Z
# Then review the draft Release on GitHub and publish when ready.
#
# Primary artifacts: bare binaries per platform + checksums.txt
# config.yaml is auto-generated on first run (bootstrap); config.example.yaml stays in the repo for reference.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend (go:embed requires web/dist)
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile release binaries
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          # modernc.org/sqlite is pure Go; CGO_ENABLED=0 yields static-ish binaries.
          ldflags="-s -w"

          build() {
            local goos="$1" goarch="$2" out="$3"
            echo "==> ${out}"
            GOOS="${goos}" GOARCH="${goarch}" go build -trimpath -ldflags="${ldflags}" -o "dist/${out}" .
          }

          build linux   amd64 matea-linux-amd64
          build linux   arm64 matea-linux-arm64
          build windows amd64 matea-windows-amd64.exe
          build darwin  amd64 matea-darwin-amd64
          build darwin  arm64 matea-darwin-arm64

          (
            cd dist
            sha256sum matea-* > checksums.txt
          )
          ls -la dist

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Quick start

            1. Download the binary for your platform (and verify `checksums.txt` if desired)
            2. Run it: `./matea` (Windows: `matea-windows-amd64.exe`)
            3. On first run a minimal `config.yaml` is created automatically (random `jwt_secret`)
            4. Open http://127.0.0.1:8080 — login `admin` / `admin123`, **change password**, then configure Gitea / LLM in **System Config**

            Optional reference files in the repo: `config.example.yaml`, `.env.example`, `docs/DEPLOYMENT.md`.
          files: |
            dist/matea-linux-amd64
            dist/matea-linux-arm64
            dist/matea-windows-amd64.exe
            dist/matea-darwin-amd64
            dist/matea-darwin-arm64
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
