# Build multi-platform gateway zip packages and open a draft GitHub Release on tag push.
# Maintainer flow: update CHANGELOG → git tag -a vX.Y.Z → git push origin vX.Y.Z
# Then review the draft Release on GitHub and publish when ready.
#
# Each zip contains: gateway binary + config.example.yaml + .env.example

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend (go:embed requires web/dist)
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile and package zip releases
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          # modernc.org/sqlite is pure Go; CGO_ENABLED=0 yields static-ish binaries.
          ldflags="-s -w"

          write_readme() {
            local dest="$1" pkg="$2" bin="$3"
            {
              echo "Gitea Agent Gateway — ${pkg}"
              echo
              echo "Contents: ${bin}, config.example.yaml, .env.example"
              echo
              echo "Quick start:"
              echo "  1. cp config.example.yaml config.yaml"
              echo "  2. cp .env.example .env"
              echo "  3. Edit config.yaml / .env (tokens, secrets)"
              echo "  4. ./${bin} -config config.yaml"
              echo
              echo "Full config: https://github.com/jeeinn/ai-dev/blob/master/config.full-example.yaml"
              echo "Deploy guide: https://github.com/jeeinn/ai-dev/blob/master/docs/DEPLOYMENT.md"
            } > "${dest}"
          }

          package() {
            local goos="$1" goarch="$2" pkg="$3" bin="$4"
            echo "==> ${pkg}.zip"
            GOOS="${goos}" GOARCH="${goarch}" go build -trimpath -ldflags="${ldflags}" -o "dist/${bin}" .

            local stage="dist/stage-${pkg}"
            rm -rf "${stage}"
            mkdir -p "${stage}"
            cp "dist/${bin}" "${stage}/${bin}"
            cp config.example.yaml "${stage}/config.example.yaml"
            cp .env.example "${stage}/.env.example"
            write_readme "${stage}/README.txt" "${pkg}" "${bin}"

            (cd "${stage}" && zip -q -r "../${pkg}.zip" .)
            rm -rf "${stage}" "dist/${bin}"
          }

          package linux   amd64 gateway-linux-amd64   gateway
          package linux   arm64 gateway-linux-arm64   gateway
          package windows amd64 gateway-windows-amd64 gateway.exe
          package darwin  amd64 gateway-darwin-amd64  gateway
          package darwin  arm64 gateway-darwin-arm64  gateway

          (
            cd dist
            sha256sum gateway-*.zip > checksums.txt
          )
          ls -la dist

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/gateway-linux-amd64.zip
            dist/gateway-linux-arm64.zip
            dist/gateway-windows-amd64.zip
            dist/gateway-darwin-amd64.zip
            dist/gateway-darwin-arm64.zip
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
