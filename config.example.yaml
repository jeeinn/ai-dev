# Gitea Agent Gateway 配置文件
# 复制为 config.yaml 并修改

server:
  host: "0.0.0.0"
  port: 8080

gitea:
  # Gitea 服务地址
  url: "http://localhost:3000"
  # 管理员 API Token（用于自动注册 Agent 账号）
  # 在 Gitea → 个人设置 → 应用 → 管理访问令牌 中创建，需要 admin 权限
  admin_token: "${GITEA_ADMIN_TOKEN}"
  # Webhook 签名密钥（在 Gitea Webhook 设置中配置的密钥）
  webhook_secret: "your-webhook-secret-here"

workspace:
  # Agent 工作目录（clone 仓库的临时目录）
  base_dir: "./data/work"
  # 失败任务保留时间
  cleanup_after: "24h"
  # 最大磁盘占用
  max_disk_usage: "10GB"

dispatcher:
  # 最大并发 Agent 数
  max_concurrent: 2
  # 失败重试次数
  retry_count: 1
  # 单任务超时（秒）
  timeout: 300
  # 任务队列大小
  queue_size: 100

database:
  # SQLite 数据库路径
  path: "./data/gateway.db"

logging:
  # 日志级别: debug / info / warn / error
  level: "info"
  # 日志目录
  path: "./data/logs"

llm:
  providers:
    # DeepSeek（推荐，性价比高）
    deepseek:
      base_url: "https://api.deepseek.com/v1"
      api_key: "${DEEPSEEK_API_KEY}"

    # OpenAI
    # openai:
    #   base_url: "https://api.openai.com/v1"
    #   api_key: "${OPENAI_API_KEY}"

    # Claude（Anthropic）
    # claude:
    #   api_key: "${ANTHROPIC_API_KEY}"

    # 本地 Ollama
    # ollama:
    #   base_url: "http://localhost:11434/v1"
    #   api_key: "ollama"

  defaults:
    provider: "deepseek"
    model: "deepseek-chat"
    max_tokens: 4096
    temperature: 0.3
