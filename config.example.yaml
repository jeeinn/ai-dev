# Gitea Agent Gateway 配置文件
# 复制为 config.yaml 并修改

server:
  host: "0.0.0.0"
  port: 8080

gitea:
  # Gitea 服务地址
  url: "http://localhost:3000"
  # 管理员 API Token（用于自动注册 Agent 账号）
  # 在 Gitea → 个人设置 → 应用 → 生成令牌，需包含 write:admin 权限
  admin_token: "${GITEA_ADMIN_TOKEN}"
  # Webhook 签名密钥（在 Gitea Webhook 设置中配置的密钥）
  webhook_secret: "your-webhook-secret-here"

workspace:
  # Agent 工作目录（clone 仓库的临时目录）
  base_dir: "./data/work"
  # 失败任务保留时间
  cleanup_after: "24h"
  # 最大磁盘占用
  max_disk_usage: "10GB"

dispatcher:
  # 最大并发 Agent 数
  max_concurrent: 2
  # 失败重试次数
  retry_count: 1
  # 单任务超时（秒）
  timeout: 300
  # LLM 返回 429 时的退避等待（秒）；0 表示关闭
  rate_limit_backoff: 30
  # 任务队列大小
  queue_size: 100

database:
  # SQLite 数据库路径
  path: "./data/gateway.db"

logging:
  # 日志级别: debug / info / warn / error
  # debug 时会记录所有 Gitea API 请求与响应摘要（敏感字段自动脱敏）
  level: "info"
  # 日志目录
  path: "./data/logs"

llm:
  providers:
    # DeepSeek（推荐，性价比高）
    deepseek:
      base_url: "https://api.deepseek.com/v1"
      api_key: "${DEEPSEEK_API_KEY}"

    # OpenAI
    # openai:
    #   base_url: "https://api.openai.com/v1"
    #   api_key: "${OPENAI_API_KEY}"

    # Claude（Anthropic）
    # claude:
    #   api_key: "${ANTHROPIC_API_KEY}"

    # 本地 Ollama
    # ollama:
    #   base_url: "http://localhost:11434/v1"
    #   api_key: "ollama"

  defaults:
    provider: "deepseek"
    model: "deepseek-chat"
    max_tokens: 2048
    temperature: 0.3

# API 管理接口配置
api:
  # 管理 API 认证 Token（留空则不认证）
  # 调用 API 时需要在 Header 中添加: Authorization: Bearer <token>
  auth_token: "${API_AUTH_TOKEN}"

# Agent 模板配置
agents:
  defaults:
    provider: "deepseek"
    model: "deepseek-chat"
    max_tokens: 2048
    temperature: 0.3

  loop:
    max_iterations: 10
    max_tokens: 4096
    timeout: "5m"
    total_timeout: "30m"
    iteration_interval: 3

  templates:
    analyze:
      name: "需求分析 Agent"
      type: "analyze"
      system_prompt: |
        你是一个需求分析专家。你的任务是分析用户提交的 Issue，评估需求完整性和可行性。
        请输出结构化的需求分析报告，包括：
        1. 需求摘要
        2. 完整性评估（是否有遗漏）
        3. 可行性分析
        4. 建议的实现方案
        5. 风险点
      user_template: |
        请分析以下 Issue：

        ## Issue #{{.Issue.Number}}: {{.Issue.Title}}

        **状态**: {{.Issue.State}}
        **作者**: {{.Issue.User.Login}}

        {{.Issue.Body}}

        请输出结构化需求分析报告。

    review:
      name: "代码审查 Agent"
      type: "review"
      system_prompt: |
        你是一个资深代码审查专家。请审查 PR 变更，输出结构化审查报告。
        关注点：
        1. 代码质量和可读性
        2. 潜在的 bug 和安全问题
        3. 性能影响
        4. 测试覆盖
        5. 改进建议
      user_template: |
        请审查以下 PR：

        ## PR #{{.PR.Number}}: {{.PR.Title}}

        **状态**: {{.PR.State}}
        **作者**: {{.PR.User.Login}}
        **分支**: {{.PR.Head.Ref}} → {{.PR.Base.Ref}}

        {{.PR.Body}}

        请输出结构化审查报告。

    reply:
      name: "评论回复 Agent"
      type: "interaction"
      system_prompt: |
        你是一个友好的 AI 助手。请根据上下文回复用户的评论。
        保持专业、简洁、有帮助。
      user_template: |
        请回复以下评论：

        **评论者**: {{.Comment.User.Login}}
        **内容**:
        {{.Comment.Body}}

        请给出有帮助的回复。

