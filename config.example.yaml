# Matea — 精简可运行示例
# 复制为 config.yaml 并修改（config.yaml 已在 .gitignore，请勿提交含 Token 的配置）
# 完整选项与注释见 config.full-example.yaml
# 敏感项建议用环境变量：见 .env.example（复制为 .env，勿提交）

server:
  host: "0.0.0.0"
  port: 8080

gitea:
  url: "http://localhost:3000"
  # Gitea → 个人设置 → 应用 → 生成令牌（需 write:admin）
  admin_token: "${GITEA_ADMIN_TOKEN}"
  # 与 Gitea Webhook 设置中的密钥一致
  webhook_secret: "your-webhook-secret-here"

workspace:
  # Session / 任务工作区根目录（省略时代码默认为 ./data/work）
  base_dir: "./data/work"

database:
  path: "./data/matea.db"

logging:
  level: "info"
  path: "./data/logs"

llm:
  providers:
    deepseek:
      base_url: "https://api.deepseek.com/v1"
      api_key: "${DEEPSEEK_API_KEY}"
      type: "openai_compatible"
  defaults:
    provider: "deepseek"
    model: "deepseek-v4-flash"

# 生产环境必须更换 jwt_secret；首次登录后立即修改默认管理员密码
auth:
  jwt_secret: "${JWT_SECRET:-change-me-in-production}"
  default_admin_password: "${ADMIN_PASSWORD:-admin123}"
