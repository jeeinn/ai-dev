# ===== Session 配置 (Phase 17) =====
# session:
#   idle_ttl: "168h"              # 7 天无活动则 archive
#   workspace_retention: "24h"    # archived 后延迟删盘
#   pr_closed_retention: "168h"   # PR 未合并关闭后保留
#   max_disk_per_repo: "5GB"      # 超限 LRU

# ===== 沙箱配置 (P1.6) =====
# 约定：task 级 workspace 为 {sandbox.base_dir}/task_{id}；Session 为 {workspace.base_dir}/sessions/...
# 若 sandbox.base_dir 留空或仍为历史默认 "./workspace"，启动时自动对齐为 workspace.base_dir。
# Session 工作区走 NewWithPath（Persistent）：不受 mode=temp 的 MkdirTemp/任务结束 Cleanup 影响，
# 回收由 SessionLifecycle（Issue closed / PR merged / idle TTL / 磁盘上限）负责。
sandbox:
  # 工作目录模式: "fixed" | "temp"（仅影响无 Session 的 task 级 workspace）
  # fixed: 使用固定 base_dir + task_{id} 子目录
  # temp: 使用临时目录 (os.MkdirTemp)，任务完成后 Cleanup（Session 路径永不走此路径）
  mode: "fixed"
  # 与 workspace.base_dir 同根，避免 Session / Sandbox 双轨分裂
  base_dir: "./data/work"
  # 单命令超时
  command_timeout: "5m"
  # 任务总超时
  task_timeout: "30m"
  # 命令输出最大字节数
  max_output: 1048576
  # 文件写入最大字节数
  max_file_size: 1048576
  # 失败任务保留时间（fixed 模式）
  cleanup_after: "24h"

# ===== MCP 服务器配置 (P2.8) =====
# 远程 MCP (Model Context Protocol) 服务器定义
# Agent 可通过 mcp_servers 字段启用指定服务器的工具
mcp:
  servers:
    # 示例：一个提供知识库检索的 MCP 服务器
    # knowledge-base:
    #   base_url: "http://localhost:8081/mcp"
    #   api_key: "${MCP_KB_API_KEY}"   # Bearer token；无鉴权可留空
    #   timeout: "30s"
    # 示例：文件系统 MCP
    # filesystem:
    #   base_url: "http://localhost:8082/mcp"
    #   timeout: "15s"
